services:
  # Redis Instance
  redis:
    image: redis:7-alpine
    container_name: cloud-kitchen-redis
    restart: unless-stopped
    ports:
      - "7999:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
