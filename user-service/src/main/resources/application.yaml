server:
  port: ${SERVER_PORT:8001}

spring:
  application:
    name: user-service

  # ── Default profile uses H2 in-memory DB for quick local testing ──
  # Switch to MySQL by running with -Dspring.profiles.active=mysql
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: update          # create schema from entities; safe for dev
    properties:
      hibernate:
        format_sql: true        
        use_sql_comments: true
    open-in-view: false        

jwt:
  secret: ${JWT_SECRET:abcdefgddas}
  access-token-expiration: 900000       
  refresh-token-expiration: 2592000000   

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:7998/eureka/}

  instance:
    prefer-ip-address: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  
    org.springframework.security: INFO

---
# ─────────────────────────────────────────────────────────────────────
# Profile: dev  →  H2 in-memory, H2 console enabled
# ─────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console            # browse at http://localhost:8001/h2-console
      settings:
        web-allow-others: false

---
# ─────────────────────────────────────────────────────────────────────
# Profile: mysql  →  Real MySQL (production-like)
# ─────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cloud_kitchen}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
