# yaml-language-server: $schema=
server:
    port: 8080

spring:
    application:
        name: api-gateway
    
    cloud:
        gateway:
            globalcors:
                core-config:
                    ["/**"]:
                    allowed-origins: "${CORS_ALLOWED_ORIGINS:-192.168.1.*:-http://localhost:3000}"
                    allowed-headers: "*"
                    allowed-methods: "*"
                    allowed-credentials: true
                    max-age: 3600
            routes:
                - id: user-service
                  uri: http://localhost:8001    # configure service discovery
                  predicates:
                    - Path=/api/users/**, /api/auth/**
                  filters:
                    - StripPrefix=1
                    - name: RequestRateLimiter
            
            # # service registry
            # discovery:
            #     locator:
            #     enabled: true
            #     lower-case-service-id: true
    
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            password: ${REDIS_PASSWORD:}
            timeout: 2000ms
            # lettuce:
            #     pool:
            #     max-active: 8
            #     max-idle: 8
            #     min-idle: 2

jwt:
    secret: ${JWT_SECRET:abcedasjdsajdkjdk}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    org.springframework.data.redis: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,configprops
  endpoint:
    env:
      show-values: when-authorized   # use "always" only for local dev
