server:
  port: ${SERVER_PORT:8000}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Unauthenticated endpoints (login/signup/refresh) — rate limited per client IP
        - id: auth-service
          uri: ${USER_SERVICE_URL:lb://user-service}    # configure service discovery
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${AUTH_RATE_BURST:10}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # Authenticated endpoints — rate limited per user (falls back to IP if the
        # X-User-Id header is absent)
        - id: user-service
          uri: ${USER_SERVICE_URL:lb://user-service}    # configure service discovery
          predicates:
            - Path=/api/user/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${USER_RATE_REPLENISH:10}
                redis-rate-limiter.burstCapacity: ${USER_RATE_BURST:20}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userOrIpKeyResolver}"
        - id: restaurant-service
          uri: ${RESTAURANT_SERVICE_URL:lb://restaurant-service}    # configure service discovery
          predicates:
            - Path=/api/restaurant/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${USER_RATE_REPLENISH:10}
                redis-rate-limiter.burstCapacity: ${USER_RATE_BURST:20}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userOrIpKeyResolver}"

      # # service registry
      # discovery:
      #     locator:
      #     enabled: true
      #     lower-case-service-id: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:7999}
      password: ${REDIS_PASSWORD:}
      # lettuce:
      #     pool:
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 2

jwt:
  secret: "${JWT_SECRET:abcedasjdsajdkjdk}"

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:7998/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    org.springframework.data.redis: WARN

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,env,configprops
  endpoint:
    env:
      show-values: when-authorized   # use "always" only for local dev
